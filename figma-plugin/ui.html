<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYX Token Importer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            font-size: 12px;
            color: #1a1a2e;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #281c6e 0%, #ff2d78 100%);
            padding: 14px 16px 12px;
            color: white;
        }

        header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* ── MAIN CONTENT ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 14px 16px;
        }

        /* ── TEXTAREA ── */
        label {
            display: block;
            font-weight: 600;
            color: #3d3d5c;
            margin-bottom: 5px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 10px;
            border: 1.5px solid #d0d0e0;
            border-radius: 6px;
            font-family: "Courier New", monospace;
            font-size: 11px;
            line-height: 1.5;
            color: #1a1a2e;
            background: white;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #281c6e;
        }

        textarea::placeholder {
            color: #aaa;
        }

        /* ── STATS PILLS ── */
        #stats {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            min-height: 24px;
        }

        .pill {
            padding: 3px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .pill-prim {
            background: #ede9fe;
            color: #4c1d95;
        }

        .pill-sem {
            background: #fce7f3;
            color: #9d174d;
        }

        .pill-comp {
            background: #d1fae5;
            color: #065f46;
        }

        .pill-err {
            background: #fee2e2;
            color: #991b1b;
        }

        .pill-ok {
            background: #d1fae5;
            color: #065f46;
        }

        /* ── BUTTONS ── */
        .btn-row {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #btn-import {
            background: linear-gradient(135deg, #281c6e 0%, #ff2d78 100%);
            color: white;
        }

        #btn-import:hover:not(:disabled) {
            opacity: 0.9;
        }

        #btn-clear {
            background: #fff;
            color: #991b1b;
            border: 1.5px solid #fca5a5;
        }

        #btn-clear:hover:not(:disabled) {
            background: #fee2e2;
        }

        /* ── LOG ── */
        #log-wrap {
            border: 1.5px solid #e0e0f0;
            border-radius: 6px;
            background: white;
            overflow: hidden;
        }

        #log-header {
            background: #f0f0f8;
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #555;
            border-bottom: 1px solid #e0e0f0;
        }

        #log {
            height: 90px;
            overflow-y: auto;
            padding: 8px 10px;
            font-family: "Courier New", monospace;
            font-size: 10.5px;
            line-height: 1.6;
            color: #333;
        }

        .log-ok {
            color: #065f46;
        }

        .log-err {
            color: #991b1b;
        }

        .log-info {
            color: #1d4ed8;
        }

        .log-head {
            color: #4c1d95;
            font-weight: 700;
        }

        /* ── PROGRESS ── */
        #progress-wrap {
            display: none;
        }

        progress {
            width: 100%;
            height: 5px;
            border-radius: 99px;
            border: none;
            overflow: hidden;
            background: #e0e0f0;
        }

        progress::-webkit-progress-bar {
            background: #e0e0f0;
        }

        progress::-webkit-progress-value {
            background: linear-gradient(90deg, #281c6e, #ff2d78);
            transition: width 0.3s;
        }

        /* ── FOOTER ── */
        footer {
            padding: 8px 16px;
            font-size: 10px;
            color: #999;
            text-align: center;
            border-top: 1px solid #e0e0f0;
        }
    </style>
</head>

<body>

    <header>
        <h1>SYX Token Importer</h1>
        <p>Generates Figma Variables from your tokens.json</p>
    </header>

    <main>
        <!-- JSON input -->
        <div>
            <label for="json-input">Paste tokens.json content</label>
            <textarea id="json-input" spellcheck="false"
                placeholder='{ "primitives": {...}, "semantic": {...}, "component": {...} }'></textarea>
        </div>

        <!-- Stats pills (populated after parse) -->
        <div id="stats"></div>

        <!-- Progress bar -->
        <div id="progress-wrap">
            <progress id="progress" value="0" max="100"></progress>
        </div>

        <!-- Action buttons -->
        <div class="btn-row">
            <button id="btn-import" disabled>⬆ Import SYX Tokens</button>
            <button id="btn-clear">🗑 Clear SYX Variables</button>
        </div>

        <!-- Log -->
        <div id="log-wrap">
            <div id="log-header">Log</div>
            <div id="log" id="log">
                <span class="log-info">Paste your tokens.json to begin…</span>
            </div>
        </div>
    </main>

    <footer>SYX Design System · github.com/Pizarradas/syx</footer>

    <script>
        const textarea = document.getElementById('json-input');
        const btnImport = document.getElementById('btn-import');
        const btnClear = document.getElementById('btn-clear');
        const statsEl = document.getElementById('stats');
        const logEl = document.getElementById('log');
        const progressWr = document.getElementById('progress-wrap');
        const progressEl = document.getElementById('progress');

        let parsedTokens = null;

        // ── LOG HELPERS ──────────────────────────────────────────────────────────
        function log(msg, cls = '') {
            const line = document.createElement('div');
            if (cls) line.className = cls;
            line.textContent = msg;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }
        function clearLog() { logEl.innerHTML = ''; }

        // ── PARSE & VALIDATE JSON ────────────────────────────────────────────────
        function tryParse(text) {
            try {
                const data = JSON.parse(text.trim());
                if (!data.primitives && !data.semantic && !data.component) {
                    throw new Error('JSON does not contain expected SYX token layers.');
                }
                return data;
            } catch (e) {
                return { error: e.message };
            }
        }

        function renderStats(data) {
            statsEl.innerHTML = '';
            if (data.error) {
                statsEl.innerHTML = `<span class="pill pill-err">⚠ ${data.error}</span>`;
                btnImport.disabled = true;
                return;
            }
            const primCount = Object.keys(data.primitives || {}).length;
            const semCount = Object.keys(data.semantic || {}).length;
            const compCount = Object.keys(data.component || {}).length;
            statsEl.innerHTML = `
      <span class="pill pill-prim">Primitives: ${primCount}</span>
      <span class="pill pill-sem">Semantic: ${semCount}</span>
      <span class="pill pill-comp">Component: ${compCount}</span>
    `;
            btnImport.disabled = false;
            parsedTokens = data;
        }

        // Live parse on type/paste
        textarea.addEventListener('input', () => {
            const text = textarea.value.trim();
            if (!text) {
                statsEl.innerHTML = '';
                btnImport.disabled = true;
                parsedTokens = null;
                return;
            }
            renderStats(tryParse(text));
        });

        // ── IMPORT ───────────────────────────────────────────────────────────────
        btnImport.addEventListener('click', () => {
            if (!parsedTokens) return;
            clearLog();
            log('Starting SYX token import…', 'log-info');
            progressWr.style.display = 'block';
            btnImport.disabled = true;
            btnClear.disabled = true;
            progressEl.value = 5;
            // Send to plugin code
            parent.postMessage({ pluginMessage: { type: 'IMPORT_TOKENS', payload: parsedTokens } }, '*');
        });

        // ── CLEAR ────────────────────────────────────────────────────────────────
        btnClear.addEventListener('click', () => {
            clearLog();
            log('Requesting SYX variable cleanup…', 'log-info');
            parent.postMessage({ pluginMessage: { type: 'CLEAR_TOKENS' } }, '*');
        });

        // ── MESSAGE HANDLER (from code.js) ───────────────────────────────────────
        window.addEventListener('message', e => {
            const msg = e.data.pluginMessage;
            if (!msg) return;

            switch (msg.type) {

                case 'LOG':
                    log(msg.text, msg.cls || '');
                    break;

                case 'PROGRESS':
                    progressEl.value = msg.value;
                    break;

                case 'DONE':
                    progressEl.value = 100;
                    setTimeout(() => { progressWr.style.display = 'none'; }, 800);
                    btnImport.disabled = false;
                    btnClear.disabled = false;
                    log('✅ Import complete!', 'log-ok');
                    statsEl.innerHTML += ' <span class="pill pill-ok">✓ Done</span>';
                    break;

                case 'ERROR':
                    log(`❌ Error: ${msg.text}`, 'log-err');
                    progressWr.style.display = 'none';
                    btnImport.disabled = false;
                    btnClear.disabled = false;
                    break;

                case 'CLEARED':
                    log('🗑 All SYX variables removed.', 'log-info');
                    break;
            }
        });
    </script>
</body>

</html>
